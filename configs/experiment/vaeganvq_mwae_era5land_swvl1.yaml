# @package _global_

defaults:
  - override /data: era5land_swvl1.yaml
  - override /model: vaeganvq.yaml
  - override /logger: many_loggers.yaml
  - override /trainer: gpu.yaml

# Train the first-stage VAE on ERA5-Land swvl1.
# We keep the original paper/repo structure and only swap the data source.
data:
  seq_len: 1
  stack_seq: null
  resize: 720
  crop: 256
  random_rotate90: False
  smart_crop: True
  max_mask_fraction: 0.40
  smart_crop_attempts: 50
  center_crop_val: False
  # VAEGANVQ is memory-hungry; batch_size=8 can OOM on 16GB GPUs.
  # Use 4 by default and override via CLI if you have more VRAM.
  batch_size: 4
  num_workers: 0

model:
  embed_dim: 8
  aeconfig:
    z_ch: 8
  loss:
    pixel_loss: mwae
    pixelloss_weight: 10.0
    perceptual_weight: 0.1

# Do not use mixed precision training for the VAEGAN model (same reason as original config).
trainer:
  min_epochs: 30
  max_epochs: 100

seed: 42
