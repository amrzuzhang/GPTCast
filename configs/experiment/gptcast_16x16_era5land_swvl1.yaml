# @package _global_

defaults:
  - override /data: era5land_swvl1.yaml
  - override /model: gptcast.yaml
  - override /logger: many_loggers.yaml
  - override /trainer: gpu.yaml

model:
  log_physical_metrics: true
  physical_metric_context_steps: 7

  transformer:
    # 8 stacked 256x256 frames (vertical stacking) -> 2048 tokens with patch_size=16.
    block_size: 2048

  first_stage:
    ckpt_path: "SET_A_VALID_CHECKPOINT_PATH_FOR_THE_FIRST_STAGE_MODEL_HERE"

# Paper-style stacked input: 8 daily frames stacked vertically into a single-channel big image.
data:
  seq_len: 8
  stack_seq: v
  resize: 720
  crop: 256
  random_rotate90: False
  smart_crop: True
  max_mask_fraction: 0.40
  smart_crop_attempts: 50
  center_crop_val: False
  batch_size: 5
  num_workers: 0
  pin_memory: False

callbacks:
  early_stopping:
    monitor: "val/tf_phys_rmse_mean"
    patience: 100
  model_checkpoint:
    monitor: "val/tf_phys_rmse_mean"
    save_top_k: 3
    save_last: True

trainer:
  # bf16 is ok for the transformer forecaster (same as original config).
  precision: bf16-true
  min_epochs: 30
  max_epochs: 100

seed: 42
