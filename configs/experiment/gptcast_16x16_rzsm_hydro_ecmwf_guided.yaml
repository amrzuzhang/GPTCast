# @package _global_

defaults:
  - override /data: era5land_hydro.yaml
  - override /model: gptcast.yaml
  - override /logger: many_loggers.yaml
  - override /trainer: gpu.yaml

model:
  log_physical_metrics: true
  physical_metric_context_steps: 7

  cond_stage_key: forcing
  use_forcing_conditioning: true
  forcing_channels: 41  # 5 forcing vars x 8 context steps + 1 ECMWF guidance channel
  forcing_n_cond_tokens: 8
  forcing_hidden_channels: 128

  transformer:
    block_size: 2304

  first_stage:
    ckpt_path: "SET_A_VALID_CHECKPOINT_PATH_FOR_THE_FIRST_STAGE_MODEL_HERE"

data:
  image_variable_key: rzsm_0_100cm
  forcing_variable_keys:
    - precipitation
    - evapotranspiration
    - runoff
    - 2m_temperature
    - surface_solar_radiation_downwards_w_m2
  guidance_variable_keys:
    - ecmwf_sm100
  guidance_target_offset: 7
  guidance_auto_download: false
  guidance_weekdays: [0, 3]
  guidance_min_year: 1995
  guidance_lead_days: [7]
  guidance_area: [42.0, 105.0, 20.0, 125.0]
  guidance_grid: "1.5/1.5"
  normalize_forcing: true
  clip_and_normalize: [0.0, 0.8, -1.0, 1.0]
  seq_len: 8
  stack_seq: v
  resize: 720
  crop: 256
  random_rotate90: False
  smart_crop: True
  max_mask_fraction: 0.40
  smart_crop_attempts: 50
  center_crop_val: False
  batch_size: 5
  num_workers: 0
  pin_memory: False

callbacks:
  early_stopping:
    monitor: "val/tf_phys_rmse_mean"
    patience: 100
  model_checkpoint:
    monitor: "val/tf_phys_rmse_mean"
    save_top_k: 3
    save_last: True

trainer:
  precision: bf16-true
  min_epochs: 30
  max_epochs: 100

seed: 42
